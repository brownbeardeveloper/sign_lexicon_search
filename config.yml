Config:
  version: "0.3"
  description: "Configuration file for the VectorDB project"

Database:
  model_name: "faiss"
  index_filename: "faiss.index"
  metadata_filename: "faiss_metadata.json"

Embedding:
  model_name: "sentence-transformers/all-MiniLM-L6-v2"

VectorStore:
  index_dir: "data"

LLM:
  base_url: "http://localhost:11434"
  model: "phi4:latest"
  temperature: 0.2
  top_p: 0.85
  max_tokens: 512
  timeout: 120